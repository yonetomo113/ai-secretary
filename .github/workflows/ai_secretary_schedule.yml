name: AI秘書 朝のブリーフィング

on:
  schedule:
    # UTC 22:20 = JST 7:20（平日のみ）
    - cron: '20 22 * * 1-5'
  workflow_dispatch:

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_briefing.txt

      - name: 依存ライブラリをインストール
        run: pip install -r requirements_briefing.txt

      - name: Google認証ファイルを構築
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_REFRESH_TOKEN_XEDGE: ${{ secrets.GMAIL_REFRESH_TOKEN_XEDGE }}
        run: python ci/setup_google_creds.py

      - name: 朝のブリーフィングを実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XEDGE_GMAIL_APP_PASSWORD: ${{ secrets.XEDGE_GMAIL_APP_PASSWORD }}
        run: python morning_briefing.py

      - name: ログをArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-log-${{ github.run_id }}
          path: "**/morning_briefing_*.log"
          retention-days: 30
