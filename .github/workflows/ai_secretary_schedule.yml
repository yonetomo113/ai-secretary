name: AI秘書 朝のブリーフィング

on:
  schedule:
    # UTC 22:20 = JST 7:20（毎日）
    - cron: '20 22 * * *'
    # UTC 22:00 = JST 7:00（火・土）wp_buffer_integration
    - cron: '0 22 * * 1,5'
  workflow_dispatch:

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_briefing.txt

      - name: 依存ライブラリをインストール
        run: pip install -r requirements_briefing.txt

      - name: Google認証ファイルを復元
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
          GOOGLE_TOKEN_XEDGE_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_XEDGE_PICKLE_B64 }}
        run: python ci/setup_google_creds.py

      - name: 朝のブリーフィングを実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XEDGE_GMAIL_APP_PASSWORD: ${{ secrets.XEDGE_GMAIL_APP_PASSWORD }}
        run: python morning_briefing.py

      - name: ログをArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-log-${{ github.run_id }}
          path: "**/morning_briefing_*.log"
          retention-days: 30

  wp-buffer-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: false

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.10 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依存ライブラリをインストール
        run: pip install requests

      - name: wp_buffer_integration を実行
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python wp_buffer_integration.py

