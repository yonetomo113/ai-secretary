name: カブさん 朝次データ取得

on:
  schedule:
    # UTC 23:50 = JST 8:50（平日のみ: UTC日〜木 = JST月〜金）
    - cron: '50 23 * * 0-4'
  workflow_dispatch:

jobs:
  kabu-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: kabu/requirements.txt

      - name: 依存ライブラリをインストール
        run: pip install -r kabu/requirements.txt

      - name: Google認証ファイルを復元
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
          GOOGLE_TOKEN_XEDGE_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_XEDGE_PICKLE_B64 }}
        run: python ci/setup_google_creds.py

      - name: カブさん 朝次実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python kabu/kabu_morning.py

      - name: レポートファイルをArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kabu-report-${{ github.run_id }}
          path: kabu/reports/*.txt
          retention-days: 30
