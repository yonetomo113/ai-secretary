name: カブさん 朝次レポート

on:
  schedule:
    # UTC 23:50 = JST 8:50（平日のみ実行）
    - cron: '50 23 * * 0-4'
  workflow_dispatch:
    # 手動実行ボタンも有効化

jobs:
  kabu-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: kabu/requirements.txt

      - name: 依存ライブラリをインストール
        run: pip install -r kabu/requirements.txt

      - name: カブさん 朝次レポートを実行
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python kabu/kabu_morning.py

      - name: レポートファイルをArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kabu-report-${{ github.run_id }}
          path: kabu/reports/*.txt
          retention-days: 30
