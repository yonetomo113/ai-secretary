name: assift シフト自動管理

on:
  schedule:
    # UTC 08:00 = JST 17:00（毎月24日）シフト自動割当
    - cron: '0 8 24 * *'
    # UTC 22:00 = JST 翌7:00（毎月22日）URL更新リマインド
    - cron: '0 22 22 * *'
  workflow_dispatch:

jobs:
  assift-auto-assign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       startsWith(github.event.schedule, '0 8 24'))

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: |
          pip install playwright google-auth google-auth-oauthlib google-api-python-client
          playwright install chromium --with-deps

      - name: Google認証ファイルを復元
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
        run: python ci/setup_google_creds.py

      - name: assift シフト自動割当を実行
        run: python assift_automator.py

      - name: スクリーンショットをArtifactとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assift-screenshots-${{ github.run_id }}
          path: logs/assift_screenshots/
          retention-days: 7

  assift-remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       github.event.schedule == '0 22 22 * *')

    steps:
      - name: assift URLリマインドをメール送信
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta

          JST = timezone(timedelta(hours=9))
          now = datetime.now(JST).strftime("%Y年%m月%d日")

          body = (
              "明日は24日です。config/shift-urls.md のassift URLを翌月分に更新してください。\n\n"
              f"送信時刻: {now}"
          )
          msg = MIMEText(body)
          msg["Subject"] = f"【リマインド】明日24日 assift URL更新 / {now}"
          msg["From"] = "g.kamifor@gmail.com"
          msg["To"] = "g.kamifor@gmail.com"

          pw = os.environ["GMAIL_APP_PASSWORD"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=15) as s:
              s.login("g.kamifor@gmail.com", pw)
              s.send_message(msg)
          print("リマインドメール送信完了")
          PYEOF
